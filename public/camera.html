<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera - PDD</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  min-height: 100vh;
  background: url("./models/Material_diffuse.jpeg") no-repeat center center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  position: relative;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(10, 15, 20, 0.75);
  backdrop-filter: blur(8px);
  z-index: 0;
}

.container {
  position: relative;
  z-index: 10;
  backdrop-filter: blur(30px);
  background: rgba(255,255,255,0.05);
  border-radius: 24px;
  padding: 30px;
  width: 420px;
  text-align: center;
  max-height: 90vh;
  overflow-y: auto;
}

video, img {
  width: 100%;
  border-radius: 18px;
  margin-top: 15px;
}

img {
  display: none;
}

.btn {
  padding: 12px 26px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  margin: 5px;
}

.capture {
  background: linear-gradient(135deg, #ff7e5f, #ff9966);
  color: white;
}

.predict {
  background: linear-gradient(135deg, #00c9a7, #00f2c3);
  color: black;
}

#result {
  margin-top: 20px;
  color: #00ffab;
}
</style>
</head>

<body>

<div class="container">
  <h2>📷 Smart Camera</h2>

  <video id="video" autoplay></video>

  <div>
    <button class="btn capture" onclick="capture()">Capture</button>
    <button class="btn predict" onclick="predict()">Predict</button>
  </div>

  <canvas id="canvas" style="display:none;"></canvas>
  <img id="preview">
  <p id="result"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAQrpnA507fjwx320kDFy3owI7YBvyvHbU",
  authDomain: "pdd-finalyear.firebaseapp.com",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const API_URL = "https://plant-disease-backend-f3cm.onrender.com";

auth.onAuthStateChanged(user => {
  if (!user) {
    alert("Login required");
    window.location.href = "/";
  }
});

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const preview = document.getElementById("preview");
const result = document.getElementById("result");

navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => video.srcObject = stream)
  .catch(() => alert("Camera access denied"));

function capture() {
  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  preview.src = canvas.toDataURL("image/jpeg", 0.8);
  preview.style.display = "block";
}

async function predict() {
  const user = auth.currentUser;

  if (!user) {
    alert("Login required");
    return;
  }

  if (!preview.src) {
    alert("Capture image first");
    return;
  }

  try {
    result.innerText = "Waking server...";
    await fetch(`${API_URL}/warmup`);

    result.innerText = "Processing...";

    const token = await user.getIdToken(true);
    const blob = await (await fetch(preview.src)).blob();

    const formData = new FormData();
    formData.append("image", blob, "capture.jpg");

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 120000);

    const res = await fetch(`${API_URL}/predict`, {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token
      },
      body: formData,
      signal: controller.signal
    });

    clearTimeout(timeout);

    const data = await res.json();

    if (!res.ok) {
      result.innerText = "Error: " + (data.error || "Failed");
      return;
    }

    result.innerText = data.message;

  } catch (err) {
    if (err.name === "AbortError") {
      result.innerText = "Request timeout";
      return;
    }

    result.innerText = "Server error";
    console.error(err);
  }
}
</script>

</body>
</html>
