<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera - PDD</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  min-height: 100vh;
  background: url("./models/Material_diffuse.jpeg") no-repeat center center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  position: relative;
}

/* dark cinematic overlay */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(10, 15, 20, 0.78);
  backdrop-filter: blur(10px);
  z-index: 0;
}

/* glass container */
.container {
  position: relative;
  z-index: 10;
  width: 420px;
  max-height: 90vh;
  overflow-y: auto;

  padding: 30px;
  text-align: center;

  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(28px);
  border-radius: 26px;

  border: 1px solid rgba(0, 255, 170, 0.15);
  box-shadow: 0 0 40px rgba(0, 255, 170, 0.08);
}

/* title */
h2 {
  font-weight: 600;
  margin-bottom: 15px;
  color: #eafff6;
}

/* preview media */
img, video {
  width: 100%;
  border-radius: 18px;
  margin-top: 15px;
  border: 1px solid rgba(0,255,170,0.2);
}

/* file input hidden */
input[type="file"] {
  display: none;
}

/* 🌿 GREEN PRIMARY BUTTON (Upload / Capture) */
.upload-btn, .capture-btn {
  display: inline-block;
  padding: 12px 26px;
  margin: 8px;
  border-radius: 30px;
  cursor: pointer;

  background: linear-gradient(135deg, #00c9a7, #00f2c3);
  color: #041b16;

  font-weight: 600;
  transition: 0.2s ease;
}

.upload-btn:hover, .capture-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 18px rgba(0, 255, 170, 0.4);
}

/* 🌿 PREDICT BUTTON (slightly deeper green glow) */
.predict-btn {
  padding: 12px 26px;
  margin: 8px;
  border-radius: 30px;
  border: none;
  cursor: pointer;

  background: linear-gradient(135deg, #00f2c3, #00c9a7);
  color: #041b16;

  font-weight: 600;
  transition: 0.2s ease;
}

.predict-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 22px rgba(0, 255, 170, 0.55);
}

/* status text */
#result {
  margin-top: 18px;
  color: #00ffab;
  font-weight: 500;
  min-height: 20px;
}

/* remedy box */
#remedyBox {
  margin-top: 15px;
  padding: 12px;
  border-radius: 14px;

  background: rgba(0, 255, 170, 0.08);
  border: 1px solid rgba(0, 255, 170, 0.2);

  color: #bfffe8;
  display: none;
}

/* scrollbar (optional polish) */
.container::-webkit-scrollbar {
  width: 6px;
}

.container::-webkit-scrollbar-thumb {
  background: rgba(0,255,170,0.3);
  border-radius: 10px;
}
</style>


</head>

<body>

<div class="container">
  <h2>Camera</h2>

  <video id="video" autoplay></video>

  <button class="capture-btn" id="captureBtn" onclick="capture()">Capture</button>
  <button class="predict-btn" id="predictBtn" onclick="predict()" disabled>Predict</button>

  <canvas id="canvas" style="display:none;"></canvas>
  <img id="preview" style="display:none;">

  <p id="result"></p>

  <div id="remedyBox"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
   apiKey: "AIzaSyAQrpnA507fjwx320kDFy3owI7YBvyvHbU",
  authDomain: "pdd-finalyear.firebaseapp.com",
};


firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const API_URL = "https://web-production-d40b9e.up.railway.app";

/* AUTH GUARD */
function waitForAuth() {
  return new Promise(resolve => {
    const unsub = auth.onAuthStateChanged(user => {
      unsub();
      resolve(user);
    });
  });
}

// Wait for Firebase to finish restoring auth state before redirecting.
async function initAuthGuard() {
  try {
    await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
  } catch (e) {
    try {
      await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
    } catch (_) {}
  }

  const user = await waitForAuth();
  if (!user) window.location.href = "/";
}

initAuthGuard();

/* CAMERA */
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => video.srcObject = stream);

function capture() {
  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  preview.src = canvas.toDataURL("image/jpeg");
  preview.style.display = "block";

  document.getElementById("predictBtn").disabled = false;
  document.getElementById("result").innerText = "";
  const remedyBox = document.getElementById("remedyBox");
  remedyBox.style.display = "none";
  remedyBox.innerText = "";
}

async function predict() {
  const user = await waitForAuth();
  if (!user) return;

  if (!preview.src) {
    alert("Please capture an image first.");
    return;
  }

  const blob = await (await fetch(preview.src)).blob();

  const formData = new FormData();
  formData.append("image", blob, "img.jpg");

  const token = await user.getIdToken();

  const predictBtn = document.getElementById("predictBtn");
  const resultEl = document.getElementById("result");
  const remedyBox = document.getElementById("remedyBox");

  predictBtn.disabled = true;
  resultEl.innerText = "Processing…";
  remedyBox.style.display = "none";
  remedyBox.innerText = "";

  try {
    const res = await fetch(`${API_URL}/predict`, {
      method: "POST",
      headers: { Authorization: "Bearer " + token },
      body: formData
    });

    const data = await res.json();

    if (!res.ok) {
      resultEl.innerText = data?.error ? `Error: ${data.error}` : "Prediction failed.";
      return;
    }

    const confidence = typeof data.confidence === "number" ? data.confidence : null;
    const confidenceText = confidence === null ? "" : `\nConfidence: ${confidence.toFixed(2)}%`;
    resultEl.innerText = `${data.message ?? "Done."}${confidenceText}`;

    if (data.remedy) {
      remedyBox.style.display = "block";
      remedyBox.innerText = data.remedy;
    }
  } catch (e) {
    resultEl.innerText = "Network error. Please try again.";
  } finally {
    predictBtn.disabled = false;
  }
}
</script>

</body>
</html>
