<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera</title>

<style>
body { font-family: Inter; background:#111; color:white; text-align:center; }
.container { margin-top:50px; }
video, img { width:300px; border-radius:15px; }
button { margin:10px; padding:10px 20px; border-radius:20px; }
</style>
</head>

<body>

<div class="container">
  <h2>Camera</h2>

  <video id="video" autoplay></video>

  <br>

  <button onclick="capture()">Capture</button>
  <button onclick="predict()">Predict</button>

  <canvas id="canvas" style="display:none;"></canvas>
  <img id="preview">

  <p id="result"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "pdd-finalyear.firebaseapp.com",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const API_URL = "https://web-production-d40b9e.up.railway.app";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const preview = document.getElementById("preview");
const result = document.getElementById("result");

function getUser() {
  return new Promise(resolve => {
    const unsub = auth.onAuthStateChanged(user => {
      unsub();
      resolve(user);
    });
  });
}

// AUTH GUARD
(async () => {
  const user = await getUser();
  if (!user) window.location.href = "/";
})();

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => video.srcObject = stream);

// CAPTURE
function capture() {
  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  preview.src = canvas.toDataURL("image/jpeg");
}

// PREDICT
async function predict() {
  const user = await getUser();
  if (!user) return;

  if (!preview.src) return result.innerText = "Capture first";

  const token = await user.getIdToken();

  const blob = await (await fetch(preview.src)).blob();

  const formData = new FormData();
  formData.append("image", blob);

  const res = await fetch(`${API_URL}/predict`, {
    method: "POST",
    headers: { Authorization: "Bearer " + token },
    body: formData
  });

  const data = await res.json();
  result.innerText = data.message || "Done";
}
</script>

</body>
</html>
