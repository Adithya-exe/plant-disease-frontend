<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload - PDD</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  min-height: 100vh;
  background: url("./models/Material_diffuse.jpeg") no-repeat center center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(10, 15, 20, 0.75);
  backdrop-filter: blur(8px);
  z-index: 0;
}

.container {
  position: relative;
  z-index: 10;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(25px);
  border-radius: 20px;
  padding: 30px;
  width: 380px;
  text-align: center;
}

.upload-btn {
  display: inline-block;
  padding: 12px 25px;
  border-radius: 30px;
  background: linear-gradient(135deg, #00c9a7, #00f2c3);
  color: black;
  cursor: pointer;
}

input[type="file"] {
  display: none;
}

img {
  width: 100%;
  border-radius: 18px;
  margin-top: 15px;
  display: none;
}

button {
  margin-top: 15px;
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(135deg, #ff7e5f, #ff9966);
  color: white;
  cursor: pointer;
}

#result {
  margin-top: 20px;
  color: #00ffab;
}

/* NEW */
#remedyBox {
  margin-top: 15px;
  background: rgba(0,255,170,0.1);
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🌿 Upload Image</h2>

  <label class="upload-btn">
    Select Image
    <input type="file" id="imageInput" accept="image/*">
  </label>

  <img id="preview">
  <button onclick="uploadImage()">Predict</button>

  <p id="result"></p>

  <!-- NEW -->
  <div id="remedyBox" style="display:none;">
    <h4>🌱 Remedy</h4>
    <p id="remedyText"></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAQrpnA507fjwx320kDFy3owI7YBvyvHbU",
  authDomain: "pdd-finalyear.firebaseapp.com",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const API_URL = "https://web-production-d40b9e.up.railway.app";

const fileInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const result = document.getElementById("result");
const remedyBox = document.getElementById("remedyBox");
const remedyText = document.getElementById("remedyText");


// ✅ FIXED AUTH HANDLING
auth.onAuthStateChanged(user => {
  if (!user) {
    result.innerText = "Session expired. Redirecting...";
    setTimeout(() => {
      window.location.href = "/";
    }, 2000);
  }
});


fileInput.onchange = () => {
  if (!fileInput.files[0]) return;
  preview.src = URL.createObjectURL(fileInput.files[0]);
  preview.style.display = "block";
};


async function compressImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    const canvas = document.createElement("canvas");
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const MAX = 512;
      let w = img.width;
      let h = img.height;

      if (w > h && w > MAX) {
        h *= MAX / w;
        w = MAX;
      } else if (h > MAX) {
        w *= MAX / h;
        h = MAX;
      }

      canvas.width = w;
      canvas.height = h;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);

      canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.8);
    };

    reader.readAsDataURL(file);
  });
}


async function uploadImage() {
  const user = auth.currentUser;

  if (!user) {
    result.innerText = "Please login first";
    return;
  }

  const file = fileInput.files[0];
  if (!file) {
    result.innerText = "Please select image";
    return;
  }

  result.innerText = "Waking server...";
  remedyBox.style.display = "none";

  try {
    await fetch(`${API_URL}/warmup`);

    result.innerText = "Processing...";

    // ✅ FIX: normal token
    const token = await user.getIdToken();

    const compressed = await compressImage(file);

    const formData = new FormData();
    formData.append("image", compressed, "image.jpg");

    const res = await fetch(`${API_URL}/predict`, {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token
      },
      body: formData
    });

    const data = await res.json();

    if (!res.ok) {
      result.innerText = "Error: " + (data.error || "Failed");
      return;
    }

    result.innerText = data.message;

    // ✅ SAFE REMEDY DISPLAY
    if (data.remedy) {
      remedyText.innerText = data.remedy;
      remedyBox.style.display = "block";
    } else {
      remedyBox.style.display = "none";
    }

  } catch (err) {
    result.innerText = "Server error";
    console.error(err);
  }
}
</script>


</body>
</html>
