<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload - PDD</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0; 
  padding: 0;
  box-sizing: border-box; 
  font-family: "Inter", sans-serif;
}

body {
  min-height: 100vh;
  background: url("./models/Material_diffuse.jpeg") no-repeat center center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
}

/* Overlay */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(10, 15, 20, 0.75);
  backdrop-filter: blur(8px);
  z-index: 0;
}

/* Container */
.container {
  position: relative;
  z-index: 10;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(25px);
  border-radius: 20px;
  padding: 30px;
  width: 380px;
  text-align: center;
}

/* Upload button */
.upload-btn {
  display: inline-block;
  padding: 12px 25px;
  border-radius: 30px;
  background: linear-gradient(135deg, #00c9a7, #00f2c3);
  color: black;
  cursor: pointer;
}

input[type="file"] {
  display: none;
}

/* Image */
img {
  width: 100%;
  border-radius: 18px;
  margin-top: 15px;
  display: none;
}

/* Button */
button {
  margin-top: 15px;
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(135deg, #ff7e5f, #ff9966);
  color: white;
  cursor: pointer;
}

/* Result */
#result {
  margin-top: 20px;
  color: #00ffab;
}
</style>
</head>

<body>

<div class="container">
  <h2>🌿 Upload Image</h2>

  <label class="upload-btn">
    Select Image
    <input type="file" id="imageInput">
  </label>

  <img id="preview">

  <button onclick="uploadImage()">Predict</button>

  <p id="result"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAQrpnA507fjwx320kDFy3owI7YBvyvHbU",
  authDomain: "pdd-finalyear.firebaseapp.com",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* Protect page */
auth.onAuthStateChanged((user) => {
  if (!user) {
    alert("Login required");
    window.location.href = "/";
  }
});

const fileInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const result = document.getElementById("result");

/* Preview */
fileInput.onchange = () => {
  preview.src = URL.createObjectURL(fileInput.files[0]);
  preview.style.display = "block";
};

/* Upload */
async function uploadImage() {
  const user = auth.currentUser;

  if (!user) {
    alert("Login required");
    return;
  }

  const file = fileInput.files[0];
  if (!file) {
    alert("Please select an image first!");
    return;
  }

  const token = await user.getIdToken(true);
  const formData = new FormData();
  formData.append("image", file);

  result.innerText = "Processing...";

  const API_URL = "https://plant-disease-backend-f3cm.onrender.com";
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 60000);

    const res = await fetch(`${API_URL}/predict`, {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token
      },
      body: formData,
      signal: controller.signal
    });

    clearTimeout(timeoutId);

    let data = null;
    const contentType = res.headers.get("content-type") || "";
    if (contentType.includes("application/json")) {
      data = await res.json();
    } else {
      const text = await res.text();
      data = { error: text };
    }

    if (!res.ok) {
      result.innerText = "Error: " + (data?.error || data?.message || "Request failed");
      return;
    }

    result.innerText = data?.message || "Done.";
  } catch (err) {
    if (err?.name === "AbortError") {
      result.innerText = "Error: Request timed out. Please try again.";
      return;
    }
    result.innerText = "Error: Failed to fetch. Check internet/CORS and try again.";
    console.error(err);
  }
}
</script>

</body>
</html>
