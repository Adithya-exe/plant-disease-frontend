<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload</title>

<style>
body { font-family: Inter; background:#111; color:white; text-align:center; }
.container { margin-top:50px; }
img { width:300px; display:none; border-radius:15px; }
button { padding:10px 20px; border-radius:20px; }
</style>
</head>

<body>

<div class="container">
  <h2>Upload Image</h2>

  <input type="file" id="file">

  <br><br>

  <img id="preview">
  <br>

  <button onclick="uploadImage()">Predict</button>

  <p id="result"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "pdd-finalyear.firebaseapp.com",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const API_URL = "https://web-production-d40b9e.up.railway.app";

const file = document.getElementById("file");
const preview = document.getElementById("preview");
const result = document.getElementById("result");

function getUser() {
  return new Promise(resolve => {
    const unsub = auth.onAuthStateChanged(user => {
      unsub();
      resolve(user);
    });
  });
}

// AUTH GUARD
(async () => {
  const user = await getUser();
  if (!user) window.location.href = "/";
})();

// PREVIEW
file.onchange = () => {
  preview.src = URL.createObjectURL(file.files[0]);
  preview.style.display = "block";
};

// UPLOAD
async function uploadImage() {
  const user = await getUser();
  if (!user) return;

  const token = await user.getIdToken();

  const blob = file.files[0];
  if (!blob) return;

  const formData = new FormData();
  formData.append("image", blob);

  const res = await fetch(`${API_URL}/predict`, {
    method: "POST",
    headers: { Authorization: "Bearer " + token },
    body: formData
  });

  const data = await res.json();
  result.innerText = data.message || "Done";
}
</script>

</body>
</html>
