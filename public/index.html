<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plant Intelligence</title>

<!-- ✅ LOAD YOUR CSS -->
<link rel="stylesheet" href="index.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- ✅ OVERLAY (fixed to match CSS class names) -->
<div id="welcomePanel" class="welcome-overlay">
  
  <button id="closePanel" class="close-btn">✕</button>

  <div class="welcome-content">
    <h1 class="title">Plant Intelligence</h1>
    <p class="tagline">AI-powered plant disease detection</p>
    <p class="desc">Detect plant diseases instantly using AI and computer vision.</p>
    
    <button id="startBtn" class="cta-btn">Get Started</button>
  </div>
</div>

<!-- ✅ BUTTONS (no inline styling needed) -->
<div>
  <button class="path-btn" onclick="login()">Login / Register</button>
  <button class="path-btn" onclick="goToUpload()">Upload Image</button>
  <button class="path-btn" onclick="goToCamera()">Access Camera</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "pdd-finalyear.firebaseapp.com",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

function getUser() {
  return new Promise(resolve => {
    const unsub = auth.onAuthStateChanged(user => {
      unsub();
      resolve(user);
    });
  });
}

// LOGIN
window.login = async function () {
  await auth.signInWithRedirect(provider);
};

// REDIRECT RESULT
auth.getRedirectResult().catch(console.error);

// BUTTONS
window.goToUpload = async function () {
  const user = await getUser();
  if (!user) return alert("Please login first");
  window.location.href = "/upload.html";
};

window.goToCamera = async function () {
  const user = await getUser();
  if (!user) return alert("Please login first");
  window.location.href = "/camera.html";
};

// UI STATE
auth.onAuthStateChanged(user => {
  const btn = document.querySelector(".path-btn");

  if (user) {
    btn.textContent = "Logged In";
    btn.disabled = true;
  } else {
    btn.textContent = "Login / Register";
    btn.disabled = false;
  }
});
</script>

<!-- ✅ THREE.JS MAIN -->
<script type="module" src="/main.js"></script>

</body>
</html>
