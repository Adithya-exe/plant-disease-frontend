<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plant Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { font-family: Inter, sans-serif; margin:0; background:#111; color:white; text-align:center; }

#welcomePanel {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display:flex;
  align-items:center;
  justify-content:center;
}

.welcome-content {
  background:#222;
  padding:30px;
  border-radius:20px;
}

button {
  padding:10px 20px;
  margin:10px;
  border-radius:20px;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="welcomePanel">
  <div class="welcome-content">
    <h1>Plant Intelligence</h1>
    <p>AI-powered plant disease detection</p>
    <button id="startBtn">Get Started</button>
  </div>
</div>

<div>
  <button class="path-btn" id="loginBtn">Login / Register</button>
  <button class="path-btn" id="uploadBtn">Upload Image</button>
  <button class="path-btn" id="cameraBtn">Access Camera</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
   apiKey: "AIzaSyAQrpnA507fjwx320kDFy3owI7YBvyvHbU",
  authDomain: "pdd-finalyear.firebaseapp.com",
};


firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

/* ================= AUTH ================= */
function waitForAuth() {
  return new Promise(resolve => {
    const unsub = auth.onAuthStateChanged(user => {
      unsub();
      resolve(user);
    });
  });
}

/* ================= LOGIN ================= */
window.login = async function () {
  await auth.signInWithRedirect(provider);
};

auth.getRedirectResult().catch(console.error);

/* ================= NAVIGATION ================= */
async function goUpload() {
  const user = await waitForAuth();
  if (!user) return alert("Please login first");
  window.location.href = "/upload.html";
}

async function goCamera() {
  const user = await waitForAuth();
  if (!user) return alert("Please login first");
  window.location.href = "/camera.html";
}

/* ================= EVENTS ================= */
document.getElementById("loginBtn").onclick = login;
document.getElementById("uploadBtn").onclick = goUpload;
document.getElementById("cameraBtn").onclick = goCamera;

/* ================= UI STATE ================= */
auth.onAuthStateChanged(user => {
  const btn = document.getElementById("loginBtn");

  if (user) {
    btn.textContent = "Logged In";
    btn.disabled = true;
    btn.style.opacity = "0.6";
  } else {
    btn.textContent = "Login / Register";
    btn.disabled = false;
    btn.style.opacity = "1";
  }
});

/* overlay */
document.getElementById("startBtn").onclick = () => {
  document.getElementById("welcomePanel").style.display = "none";
};
</script>

</body>
</html>
